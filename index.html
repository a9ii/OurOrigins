<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CORS Gateway</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--accent);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            min-height: 150px;
            max-height: 400px;
            overflow-y: auto;
            position: relative;
        }

        pre {
            color: #a5b4fc;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pill-container {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .pill {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .pill:hover {
            background: rgba(255, 255, 255, 0.2);
        }

    </style>
</head>
<body>

    <div class="glass-panel">
        <header>
            <h1>API Proxy Gateway</h1>
            <p class="subtitle">Secure, high-performance mapped target routing.</p>
        </header>

        <div class="pill-container">
            <span class="pill" onclick="document.getElementById('aliasInput').value = '1'">Test Alias: 1</span>
            <span class="pill" onclick="document.getElementById('aliasInput').value = '2'">Test Alias: 2</span>
            <span class="pill" onclick="document.getElementById('aliasInput').value = 'secret_api'">Test Alias: secret_api</span>
        </div>

        <div class="input-group">
            <input type="text" id="aliasInput" placeholder="Enter predefined Alias ID (e.g., 1)" autocomplete="off">
            <button id="fetchBtn">
                <span id="btnText">Execute</span>
                <div class="loader" id="loader"></div>
            </button>
        </div>

        <div class="result-box">
            <pre id="outputCode">// Awaiting request payload...</pre>
        </div>
    </div>

    <script>
        const btn = document.getElementById('fetchBtn');
        const input = document.getElementById('aliasInput');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const output = document.getElementById('outputCode');

        btn.addEventListener('click', async () => {
            const alias = input.value.trim();
            if (!alias) return;

            // UI Loading state
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            output.style.color = '#94a3b8';
            output.textContent = `Fetching map for alias '${alias}'...`;

            try {
                const response = await fetch(`/get?cros=${encodeURIComponent(alias)}`);
                
                // Read text response (handles both raw, JSON, and JSONP strings natively)
                const data = await response.text(); 
                
                if (!response.ok) {
                    output.style.color = '#ef4444'; // Error Red
                    output.textContent = `Error ${response.status}:\n${data}`;
                } else {
                    output.style.color = '#a5b4fc'; // Success Blue/Purple
                    
                    // Attempt to format gracefully if it is JSON, otherwise leave as string
                    try {
                        const jsonObj = JSON.parse(data);
                        output.textContent = JSON.stringify(jsonObj, null, 2);
                    } catch (e) {
                        output.textContent = data; // For Raw/JSONP
                    }
                }
            } catch (err) {
                output.style.color = '#ef4444';
                output.textContent = `Network Error: ${err.message}`;
            } finally {
                // Restore UI
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        });

        // Enter key support
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btn.click();
        });
    </script>
</body>
</html>
